const TZ_TABLE={in:{name:'Asia/Kolkata',offset:5.5},lk:{name:'Asia/Colombo',offset:5.5},np:{name:'Asia/Kathmandu',offset:5.75},pk:{name:'Asia/Karachi',offset:5},bd:{name:'Asia/Dhaka',offset:6},ae:{name:'Asia/Dubai',offset:4},sg:{name:'Asia/Singapore',offset:8},my:{name:'Asia/Kuala_Lumpur',offset:8},gb:{name:'Europe/London',offset:0},us:{name:'America/New_York',offset:-5},ca:{name:'America/Toronto',offset:-5},au:{name:'Australia/Sydney',offset:10},de:{name:'Europe/Berlin',offset:1},fr:{name:'Europe/Paris',offset:1},jp:{name:'Asia/Tokyo',offset:9},cn:{name:'Asia/Shanghai',offset:8},ru:{name:'Europe/Moscow',offset:3},sa:{name:'Asia/Riyadh',offset:3},za:{name:'Africa/Johannesburg',offset:2}};
function resolveTimezone(countryCode,lon){
  const cc=(countryCode||'').toLowerCase();
  if(TZ_TABLE[cc])return {...TZ_TABLE[cc],approx:false};
  const offset=Math.round((lon/15)*2)/2;
  return {name:'UTC'+(offset>=0?'+':'')+offset,offset,approx:true};
}
async function geocodePlace(place){
  const url=`https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=1&q=${encodeURIComponent(place)}`;
  const res=await fetch(url,{headers:{'Accept':'application/json'}});
  if(!res.ok)throw new Error('geocode-http-'+res.status);
  const data=await res.json();
  if(!data||!data.length)return null;
  const r=data[0];
  return {lat:parseFloat(r.lat),lon:parseFloat(r.lon),display:r.display_name,countryCode:(r.address&&r.address.country_code)||''};
}

function birthUtcMsFrom(dob,tob,tzOffset){

function calcProfile(raw){

  const ayan=Astro.lahiriAyanamsa(jd);
  const tropical={Sun:Astro.sunLongitude(jd),Moon:Astro.moonLongitude(jd),Mercury:Astro.planetLongitude('Mercury',jd),Venus:Astro.planetLongitude('Venus',jd),Mars:Astro.planetLongitude('Mars',jd),Jupiter:Astro.planetLongitude('Jupiter',jd),Saturn:Astro.planetLongitude('Saturn',jd)};

function isFiniteNum(v){return typeof v==='number'&&Number.isFinite(v)}
function hasCompleteBodies(p){return !!(p&&p.bodies)&&planets.every(pl=>isFiniteNum(p.bodies[pl]))}
function normalizeProfile(p){

    p={...p};

    p.fullName=p.fullName||p.name||p.profileName||'Untitled Profile';
    p.gender=p.gender||p.genderLabel||p.label||'—';
    p.pob=p.pob||p.place||p.birthPlace||'Chennai, Tamil Nadu';
    p.dob=p.dob||p.dateOfBirth||p.birthDate;
    p.tob=p.tob||p.timeOfBirth||p.birthTime;
    p.lat=Number(p.lat??p.latitude??13.0827);
    p.lon=Number(p.lon??p.lng??p.longitude??80.2707);
    p.tzOffset=Number(p.tzOffset??p.utcOffset??5.5);
    p.tzName=p.tzName||p.timezone||'Asia/Kolkata';

  if(pl==='Sun'||pl==='Moon')return false;
  const l0=Astro.planetLongitude(pl,Astro.toJD(new Date(birthUtcMs-86400000)));
  const l1=Astro.planetLongitude(pl,Astro.toJD(new Date(birthUtcMs+86400000)));

function daysBetween(start,end){const out=[];for(let d=new Date(start.getFullYear(),start.getMonth(),start.getDate());d<=end;d.setDate(d.getDate()+1))out.push(new Date(d.getFullYear(),d.getMonth(),d.getDate()));return out}
function panchangamDays(count=30){const today=new Date(), out=[];for(let i=0;i<count;i++)out.push(dailyPanchangamFor(new Date(today.getFullYear(),today.getMonth(),today.getDate()+i)));return out}
function yearPanchangam(year){return daysBetween(new Date(year,0,1),new Date(year,11,31)).map(dailyPanchangamFor)}

function muhurthamDetailCard(e){const m=muhurthamStrength(e);return `<div class="mini calendar"><div class="toolbar"><b>${e.title}</b>${badge(m.score)}</div><p class="small muted">${e.date} · ${e.start}-${e.end} · ${m.band}</p><p class="small muted">${e.desc}</p><p class="small muted"><b>Checklist:</b> avoid Rahu Kalam / Emakandam, confirm local sunrise, validate star compatibility and family priest rules.</p><button class="btn primary" data-ics="${e.id}">＋ Add .ics</button></div>`}
function deriveChart(p){
  p=normalizeProfile(p)||defaultProfiles[0];
  const corr=aiVerifiedCorrection(p);
  const lagnaSignIdx=corr?.lagnaSignIdx??Astro.signIndex(p.lagnaLon), moonSignIdx=corr?.moonSignIdx??Astro.signIndex(p.bodies.Moon);
  const nakIdx=corr?.nakIdx??Astro.nakshatraIndex(p.bodies.Moon), pada=corr?.pada??Astro.padaIndex(p.bodies.Moon);
  const navamsaMoonIdx=Astro.navamsaIndex(p.bodies.Moon);
  const positions=planets.map(pl=>{
    const lon=p.bodies[pl], sIdx=Astro.signIndex(lon);
    return {planet:pl,lon,sign:signs[sIdx],signIdx:sIdx,houseFromLagna:Astro.houseFromLagna(sIdx,lagnaSignIdx),houseFromMoon:Astro.houseFromLagna(sIdx,moonSignIdx),navamsaSign:signs[Astro.navamsaIndex(lon)],nakshatra:naks[Astro.nakshatraIndex(lon)],degree:fmtDegree(lon),retro:isRetrograde(pl,p.birthUtcMs)};
  });
  if(corr){positions.forEach(x=>{if(x.planet==='Moon'){x.sign=corr.rasi;x.signIdx=corr.moonSignIdx;x.nakshatra=corr.nakshatra} if(x.planet==='Sun'){x.sign=corr.sunSign;x.signIdx=corr.sunSignIdx}})}
  const sunIdx=corr?.sunSignIdx??Astro.signIndex(p.bodies.Sun);
  return {lagnaSignIdx,moonSignIdx,nakIdx,pada,navamsaMoonIdx,positions,rasi:corr?.rasi??signs[moonSignIdx],nakshatra:corr?.nakshatra??naks[nakIdx],lagna:corr?.lagna??signs[lagnaSignIdx],navamsa:signs[navamsaMoonIdx],sunSign:corr?.sunSign??signs[sunIdx],tithi:corr?.tithi??deriveTithi(p),correctionSource:corr?.source||''};
}
function navamsaPositionsFor(p){
  const navLagnaIdx=Astro.navamsaIndex(p.lagnaLon);
  return planets.map(pl=>{const navIdx=Astro.navamsaIndex(p.bodies[pl]);return {planet:pl,house:Astro.houseFromLagna(navIdx,navLagnaIdx)}});
}
function positionsFor(p){return deriveChart(p).positions}
function deriveDasa(p,nowMs=Date.now()){p=normalizeProfile(p)||defaultProfiles[0];return Astro.currentDasaBhukti(p.bodies.Moon,p.birthUtcMs,nowMs)}
function deriveTransit(p,nowMs=Date.now()){
  p=normalizeProfile(p)||defaultProfiles[0];
  const jdNow=Astro.toJD(new Date(nowMs)), ayanNow=Astro.lahiriAyanamsa(jdNow);
  const fnMap={Sun:Astro.sunLongitude,Moon:Astro.moonLongitude,Mercury:jd=>Astro.planetLongitude('Mercury',jd),Venus:jd=>Astro.planetLongitude('Venus',jd),Mars:jd=>Astro.planetLongitude('Mars',jd),Jupiter:jd=>Astro.planetLongitude('Jupiter',jd),Saturn:jd=>Astro.planetLongitude('Saturn',jd)};
  const bodiesNow={}; Object.entries(fnMap).forEach(([k,fn])=>bodiesNow[k]=Astro.norm360(fn(jdNow)-ayanNow));
  const rahuNow=Astro.norm360(Astro.rahuLongitude(jdNow)-ayanNow); bodiesNow.Rahu=rahuNow; bodiesNow.Ketu=Astro.norm360(rahuNow+180);
  const chart=deriveChart(p);
  return planets.map(pl=>{const lon=bodiesNow[pl],sIdx=Astro.signIndex(lon);return {planet:pl,sign:signs[sIdx],houseFromNatalLagna:Astro.houseFromLagna(sIdx,chart.lagnaSignIdx),houseFromNatalMoon:Astro.houseFromLagna(sIdx,chart.moonSignIdx)}});
}
function deriveYogasDoshas(p){return Astro.detectYogasDoshas(deriveChart(p).positions)}

function renderModal(){
  if(!draft)return;
  const d=draft;
  $('#modalBody').innerHTML=`<h2>${d.id?t('editProfile'):t('addProfileTitle')}</h2>
  <div class="stack">
    <div><label>${t('name')}</label><input id="mName" value="${esc(d.fullName)}"></div>
    <div class="row"><div><label>${t('genderLabel')}</label><input id="mGender" value="${esc(d.gender)}"></div>
    <div><label>${t('dob')}</label><input id="mDob" type="date" value="${esc(d.dob)}"></div></div>
    <div class="row"><div><label>${t('tob')}</label><input id="mTob" type="time" value="${esc(d.tob)}"></div>
    <div><label>${t('pob')}</label><input id="mPob" value="${esc(d.pob)}"></div></div>
    <div class="toolbar"><button class="btn" id="mGeoBtn" type="button">${d.geoBusy?t('searching'):t('findCoordinates')}</button><button class="btn" id="mManualBtn" type="button">${t('manualEntry')}</button></div>
    <p class="geo-status">${esc(d.geoMsg)}</p>
    ${(d.manual||d.lat==null)?`<div class="row"><div><label>${t('latitude')}</label><input id="mLat" type="number" step="0.0001" value="${d.lat??''}"></div><div><label>${t('longitude')}</label><input id="mLon" type="number" step="0.0001" value="${d.lon??''}"></div></div><div><label>${t('utcOffset')}</label><input id="mTz" type="number" step="0.25" value="${d.tzOffset}"></div><p class="small muted">${t('timezoneApprox')}</p>`
      :`<p class="small muted">${d.lat.toFixed(4)}°, ${d.lon.toFixed(4)}° · UTC${d.tzOffset>=0?'+':''}${d.tzOffset} (${d.tzName})</p>`}
    <div class="actions"><button class="btn" id="mCancel" type="button">${t('cancel')}</button><button class="btn primary" id="mSave" type="button">${t('save')}</button></div>
  </div>`;
  bindModal();
}
function bindModal(){
  $('#mName').oninput=e=>draft.fullName=e.target.value;
  $('#mGender').oninput=e=>draft.gender=e.target.value;
  $('#mDob').oninput=e=>draft.dob=e.target.value;
  $('#mTob').oninput=e=>draft.tob=e.target.value;
  $('#mPob').oninput=e=>draft.pob=e.target.value;
  const latEl=$('#mLat'),lonEl=$('#mLon'),tzEl=$('#mTz');
  if(latEl)latEl.oninput=e=>draft.lat=parseFloat(e.target.value);
  if(lonEl)lonEl.oninput=e=>draft.lon=parseFloat(e.target.value);
  if(tzEl)tzEl.oninput=e=>draft.tzOffset=parseFloat(e.target.value);
  $('#mManualBtn').onclick=()=>{draft.manual=true;renderModal()};
  $('#mGeoBtn').onclick=async()=>{
    if(!draft.pob){draft.geoMsg=t('requiredFieldsMsg');renderModal();return}
    draft.geoBusy=true;draft.geoMsg=t('searching');renderModal();
    try{
      const r=await geocodePlace(draft.pob);
      if(!r){draft.geoMsg=t('geocodeNotFound');draft.manual=true}
      else{
        const tz=resolveTimezone(r.countryCode,r.lon);
        draft.lat=r.lat;draft.lon=r.lon;draft.countryCode=r.countryCode;draft.tzOffset=tz.offset;draft.tzName=tz.name;
        draft.geoMsg=`${t('coordinatesFound')} ${r.lat.toFixed(4)}°, ${r.lon.toFixed(4)}°${tz.approx?' · '+t('timezoneApprox'):''}`;
        draft.manual=false;
      }
    }catch(err){draft.geoMsg=t('geocodeError');draft.manual=true}
    draft.geoBusy=false;renderModal();
  };
  $('#mCancel').onclick=closeProfileModal;
  $('#mSave').onclick=saveProfileFromDraft;
}
function saveProfileFromDraft(){
  const d=draft;
  if(!d.fullName||!d.dob||!d.tob||!d.pob){toast(t('requiredFieldsMsg'));return}
  if(d.lat==null||d.lon==null||Number.isNaN(d.lat)||Number.isNaN(d.lon)){toast(t('needCoordsMsg'));return}
  const birthUtcMs=birthUtcMsFrom(d.dob,d.tob,d.tzOffset);
  const raw={id:d.id||(Math.max(0,...profiles.map(x=>x.id))+1),fullName:d.fullName,gender:d.gender||'—',dob:d.dob,tob:d.tob,pob:d.pob,lat:d.lat,lon:d.lon,tzOffset:d.tzOffset,tzName:d.tzName,countryCode:d.countryCode,birthUtcMs};
  const computed=calcProfile(raw);
  if(d.id){
    const idx=profiles.findIndex(p=>p.id===d.id);
    profiles[idx]=computed; selected=computed; toast(t('profileUpdated'));
  }else{
    profiles.push(computed); selected=computed; toast(t('profileSaved'));
  }
  saveProfiles(); closeProfileModal(); render();
}

/* ---------------------------- Row actions (dup/del/export/print) ---------------------------- */
function act(a,id){
  let p=profiles.find(x=>x.id==id); if(!p)return;
  if(a==='edit')return openProfileModal(p);
  if(a==='dup'){const c=calcProfile({...p,id:Math.max(0,...profiles.map(x=>x.id))+1,fullName:p.fullName+' Copy'});profiles.push(c);selected=c;saveProfiles();render();return}
  if(a==='del'){if(profiles.length===1)return toast(t('atLeastOneProfile'));if(confirm(t('confirmDelete'))){profiles=profiles.filter(x=>x.id!=id);selected=profiles[0];saveProfiles();toast(t('profileDeleted'));render()}return}
  if(a==='export'){const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),ael=document.createElement('a');ael.href=u;ael.download=p.fullName.replace(/\s+/g,'-')+'.json';ael.click();URL.revokeObjectURL(u);return}
  if(a==='print')window.print();
}

/* ---------------------------- Compatibility / property / business (unchanged demo logic) ---------------------------- */
function placementsBadgeRow(){return ''}
function cal(type='all'){const arr=muhurthamDates.filter(e=>type==='all'||e.id.includes(type));return `<div class="card"><h2>📅 Muhurtham Calendar</h2><div class="grid half" style="margin-top:14px">${arr.map(e=>`<div class="mini calendar"><b>${e.title}</b><p class="small muted">${e.date} · ${e.start}-${e.end}</p><p class="small muted">${e.desc}</p><button class="btn primary" data-ics="${e.id}">＋ Add .ics</button></div>`).join('')}</div></div>`}
function input(k,f,type,label){return `<div><label>${label}</label><input data-form="${k}" data-field="${f}" type="${type}" value="${esc(val(k,f))}"></div>`}
function pick(k,f,label){return `<div><label>${label}</label><select data-form="${k}" data-field="${f}"><option value="">Select saved profile</option>${profiles.map(p=>`<option value="${p.id}" ${val(k,f)==p.id?'selected':''}>${esc(p.fullName)} — ${p.dob}</option>`).join('')}</select></div>`}
function applyPick(k,role,id){const p=profiles.find(x=>x.id==id); if(!p)return; setVal(k,role+'Name',p.fullName);setVal(k,role+'Dob',p.dob);setVal(k,role+'Time',p.tob||'');setVal(k,role+'Place',p.pob)}
function form(k,title,modes=['Single Person','Married Couple']){
  const mode=val(k,'mode')||modes[0]; let body='';
  if(k==='compatibility'){body=`<div class="grid half" style="margin-top:14px"><div class="card" style="box-shadow:none"><h3>Bride Details</h3><div class="stack" style="margin-top:12px">${pick(k,'brideProfile','Search / pick bride profile')}${input(k,'brideName','text','Bride Name')}${input(k,'brideDob','date','DOB')}${input(k,'brideTime','time','Time')}${input(k,'bridePlace','text','Place')}</div></div><div class="card" style="box-shadow:none"><h3>Groom Details</h3><div class="stack" style="margin-top:12px">${pick(k,'groomProfile','Search / pick groom profile')}${input(k,'groomName','text','Groom Name')}${input(k,'groomDob','date','DOB')}${input(k,'groomTime','time','Time')}${input(k,'groomPlace','text','Place')}</div></div></div><button class="btn primary" style="margin-top:14px" data-analyze="compatibility">Analyze Match</button>`}
  else if(mode==='Married Couple'){body=`<div class="grid half" style="margin-top:14px"><div class="card" style="box-shadow:none"><h3>Husband Details</h3><div class="stack" style="margin-top:12px">${pick(k,'husbandProfile','Search / pick husband')}${input(k,'husbandName','text','Name')}${input(k,'husbandDob','date','DOB')}${input(k,'husbandTime','time','Time')}${input(k,'husbandPlace','text','Place')}</div></div><div class="card" style="box-shadow:none"><h3>Wife Details</h3><div class="stack" style="margin-top:12px">${pick(k,'wifeProfile','Search / pick wife')}${input(k,'wifeName','text','Name')}${input(k,'wifeDob','date','DOB')}${input(k,'wifeTime','time','Time')}${input(k,'wifePlace','text','Place')}</div></div></div><button class="btn primary" style="margin-top:14px" data-analyze="${k}">Analyze ${title}</button>`}
  else {body=`<div class="grid form4" style="margin-top:14px">${pick(k,'singleProfile','Search / pick saved profile')}${input(k,'name','text','Name')}${input(k,'dob','date','DOB')}${input(k,'time','time','Time')}</div><div style="margin-top:10px">${input(k,'place','text','Place')}</div><button class="btn primary" style="margin-top:14px" data-analyze="${k}">Analyze ${title}</button>`}
  return `<div class="card"><div class="toolbar"><div><h2>${title}</h2><p class="small muted">Fields auto-save and remain after clicking/selecting/searching.</p></div>${k==='compatibility'?'':`<div>${modes.map(m=>`<button class="btn ${mode===m?'primary':''}" data-mode="${k}" data-value="${m}">${m}</button>`).join(' ')}</div>`}</div>${body}</div>`;
}
function scoreBand(score){return score>=85?'Excellent':score>=75?'Strong':score>=65?'Moderate':score>=55?'Caution':'Weak'}
function scoreDetails(k,score,seedText){
  const h=hash(seedText+k), jitter=i=>((h>>(i*3))%11)-5, clamp=v=>Math.max(35,Math.min(98,v));
  const map=k==='compatibility'?
    [['Dina / Tara Balance',score+jitter(1),'Daily star harmony and routine comfort.'],['Gana & Temperament',score+jitter(2),'Personality rhythm and communication style.'],['Rasi & Rasi Athipathi',score+jitter(3),'Moon-sign relationship and sign-lord friendliness.'],['Rajju / Nadi Review',score-8+jitter(4),'Traditional long-term stability risk checks.'],['Kuja / Dasa Sandhi',score-5+jitter(5),'Mars placement and major-period transition caution.']]:
    k==='property'?
    [['Lagna & 4th House Support',score+jitter(1),'Residence stability and ownership support.'],['Mars/Saturn Land Factors',score-4+jitter(2),'Land, construction, delay and dispute indicators.'],['Finance & Loan Timing',score+jitter(3),'Cash flow and approval timing.'],['Document Window',score-6+jitter(4),'Registration and agreement timing.'],['Muhurtham Fit',score+jitter(5),'Auspicious timing support.']]:
    [['10th House Strength',score+jitter(1),'Execution and professional momentum.'],['Mercury/Jupiter Logic',score+jitter(2),'Planning, contracts and advisory support.'],['Venus/Mars Market Energy',score-3+jitter(3),'Sales, branding and competitive drive.'],['Cash-flow Risk',score-7+jitter(4),'Working capital and volatility risk.'],['Launch Muhurtham Fit',score+jitter(5),'Suitability of the launch window.']];
  return map.map(([label,value,why])=>{value=clamp(value);return {label,value,why,advice:value>=75?'Favourable':value>=60?'Acceptable with review':'Needs careful review'}});
}
function result(k){const r=results[k];return r?`<div class="card ok"><div class="toolbar"><h2>${r.title}</h2>${badge(r.score)}</div><p class="muted">${r.text}</p>${r.details?`<div class="grid" style="grid-template-columns:repeat(2,1fr);margin-top:14px">${r.details.map(d=>`<div class="mini"><div class="toolbar"><b>${d.label}</b>${badge(d.value)}</div><div class="bar" style="margin:9px 0"><div class="fill" style="width:${d.value}%"></div></div><p class="small muted"><b>Why:</b> ${d.why}</p><p class="small muted"><b>Advice:</b> ${d.advice}</p></div>`).join('')}</div>`:''}</div>`:''}
function analyze(k){
  if(k==='compatibility'){const raw=val(k,'brideName')+val(k,'brideDob')+val(k,'brideTime')+val(k,'bridePlace')+val(k,'groomName')+val(k,'groomDob')+val(k,'groomTime')+val(k,'groomPlace'); const s=55+(hash(raw)%42); results[k]={title:'AI Wedding Compatibility Result',score:s,text:`Overall band: ${scoreBand(s)}. ${s>=80?'Strong match. Proceed with Muhurtham validation.':'Moderate/caution area. Review Rajju, Nadi, Kuja Dosha and Dasa Sandhi.'}`,details:scoreDetails(k,s,raw)}}
  else{const mode=val(k,'mode')||'Single Person'; let raw=mode==='Married Couple'?val(k,'husbandName')+val(k,'husbandDob')+val(k,'husbandTime')+val(k,'wifeName')+val(k,'wifeDob')+val(k,'wifeTime'):val(k,'name')+val(k,'dob')+val(k,'time')+val(k,'place'); const s=60+(hash(raw+k)%36); results[k]={title:`AI ${k==='property'?'Property':'Business'} Recommendation`,score:s,text:`Overall band: ${scoreBand(s)}. ${s>=80?'Favorable period. Use the suggested Muhurtham and proceed after practical due diligence.':'Usable with caution. Prefer document review, financial validation and stronger Muhurtham selection.'}`,details:scoreDetails(k,s,raw)}}
  saveResults();toast('AI analysis completed with detailed explanation');render();
}
function dt(date,time){return new Date(`${date}T${time}:00`)} function pad(n){return String(n).padStart(2,'0')}
function icsDate(d){return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z'}
function downloadIcs(e){const txt=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//VedicSuite//Muhurtham//EN\r\nBEGIN:VEVENT\r\nUID:${e.id}@vedicsuite\r\nDTSTAMP:${icsDate(new Date())}\r\nDTSTART:${icsDate(dt(e.date,e.start))}\r\nDTEND:${icsDate(dt(e.date,e.end))}\r\nSUMMARY:${e.title}\r\nDESCRIPTION:${e.desc}\r\nLOCATION:India\r\nEND:VEVENT\r\nEND:VCALENDAR\r\n`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/calendar'}));a.download=e.id+'.ics';a.click();URL.revokeObjectURL(a.href)}

/* ---------------------------- Wiring ---------------------------- */
function bind(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{active=b.dataset.nav;document.querySelector('#side').classList.remove('open');render()});
  document.querySelector('#addBtn')?.addEventListener('click',()=>openProfileModal(null));
  document.querySelector('#search')?.addEventListener('input',e=>{query=e.target.value;render()});
  document.querySelectorAll('[data-profile]').forEach(c=>c.onclick=e=>{if(e.target.closest('button'))return;selected=profiles.find(p=>p.id==c.dataset.profile)||profiles[0];render()});
  document.querySelectorAll('[data-act]').forEach(b=>b.onclick=e=>{e.stopPropagation();act(b.dataset.act,+b.dataset.id)});
  document.querySelectorAll('[data-form][data-field]').forEach(el=>{el.oninput=e=>setVal(e.target.dataset.form,e.target.dataset.field,e.target.value);el.onchange=e=>{setVal(e.target.dataset.form,e.target.dataset.field,e.target.value);const f=e.target.dataset.field,k=e.target.dataset.form;if(f.endsWith('Profile')&&e.target.value){applyPick(k,f.replace('Profile',''),e.target.value);render()}}});
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{setVal(b.dataset.mode,'mode',b.dataset.value);render()});
  document.querySelectorAll('[data-analyze]').forEach(b=>b.onclick=()=>analyze(b.dataset.analyze));
  document.querySelectorAll('[data-ics]').forEach(b=>b.onclick=()=>downloadIcs(muhurthamDates.find(e=>e.id===b.dataset.ics)));
}
function render(){
  selected=normalizeProfile(selected)||profiles[0]||defaultProfiles[0];
  profiles=profiles.map(normalizeProfile).filter(Boolean);
  if(!profiles.length)profiles=[...defaultProfiles];
  saveProfiles();
  const meta=navItems.find(x=>x[0]===active)||navItems[0];
  $('#pageIcon').textContent=meta[2]; $('#pageTitle').textContent=t(meta[1]);
  $('#nav').innerHTML=nav();
  try{
    $('#content').innerHTML={dashboard,dailypanchangam:dailyPanchangam,rahukalam:rahuKalamPage,tamilcalendar:tamilCalendar,muhurtham:muhurthamDetails,horoscope,compatibility,property:()=>prediction('property'),business:()=>prediction('business'),reports,engine}[active]();
  }catch(e){
    $('#content').innerHTML=`<div class="card"><h2>Something went wrong on this page</h2><p class="muted">${esc(e.message)}</p></div>`;
    toast('Page error: '+e.message);
  }
  bind();
}
function init(){
  document.documentElement.dataset.theme=safeGet('theme','light');
  $('#themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';
  $('#themeBtn').onclick=()=>{let tt=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=tt;safeSet('theme',tt);$('#themeBtn').textContent=tt==='dark'?'☀️':'🌙'};
  $('#langBtn').textContent=t('langToggleLabel');
  $('#langBtn').onclick=()=>{lang=lang==='en'?'ta':'en';safeSet('lang',lang);$('#langBtn').textContent=t('langToggleLabel');render()};
  $('#menuBtn').onclick=()=>$('#side').classList.toggle('open');
  $('#modalCancelBg').onclick=e=>{if(e.target.id==='modalCancelBg')closeProfileModal()};
  $('#nav').addEventListener('click',e=>{const b=e.target.closest('[data-nav]');if(!b)return;active=b.dataset.nav;document.querySelector('#side').classList.remove('open');render()});
  render();
}
window.addEventListener('error',e=>toast('Script error: '+e.message));
init();
