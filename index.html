function saveFeature(key){safeSet(featureStoreKey(key),JSON.stringify(featurePayload(key)));toast('Saved '+key+' data locally')}
function exportFeature(key){const blob=new Blob([JSON.stringify(featurePayload(key),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vedicsuite-'+key+'-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);toast('Exported '+key+' JSON')}
function importFeature(key,file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(Array.isArray(data.profiles)&&data.profiles.length){profiles=data.profiles.map(normalizeProfile).filter(Boolean);selected=profiles.find(p=>p.id===data.selectedId)||profiles[0]||selected;saveProfiles()}if(key==='dashboard'&&data.forms&&typeof data.forms==='object'){forms=data.forms;saveForms()}else if(data.forms&&typeof data.forms==='object'){forms[key]=data.forms;saveForms()}if(key==='dashboard'&&data.results&&typeof data.results==='object'){results=data.results;saveResults()}else if(data.result&&typeof data.result==='object'){results[key]=data.result;saveResults()}if(data.settings){if(data.settings.lang)safeSet('lang',data.settings.lang);if(data.settings.theme)safeSet('theme',data.settings.theme);if(data.settings.tamCalYear)safeSet('tamCalYear',data.settings.tamCalYear);if(data.settings.tamCalMonth)safeSet('tamCalMonth',data.settings.tamCalMonth)}safeSet(featureStoreKey(key),JSON.stringify(data));toast('Imported '+key+' data');render()}catch(e){toast('Import failed: invalid JSON')}};reader.readAsText(file)}
function dataActionBar(key){return `<div class="card"><div class="toolbar"><div><h3>💾 Save / Export / Import</h3><p class="small muted">Actions for this page only.</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" data-feature-save="${key}">Save</button><button class="btn" data-feature-export="${key}">Export</button><button class="btn" data-feature-import="${key}">Import</button><input type="file" accept="application/json,.json" data-feature-file="${key}" style="display:none"></div></div></div>`}
function printActionBar(){return `<div class="card"><div class="toolbar"><div><h3>🖨️ Print</h3><p class="small muted">Print or save this page as PDF.</p></div><button class="btn primary" data-page-print="1">Print</button></div></div>`}
function bindFeatureActions(){document.querySelectorAll('[data-feature-save]').forEach(b=>b.onclick=()=>saveFeature(b.dataset.featureSave));document.querySelectorAll('[data-feature-export]').forEach(b=>b.onclick=()=>exportFeature(b.dataset.featureExport));document.querySelectorAll('[data-feature-import]').forEach(b=>b.onclick=()=>{const f=document.querySelector(`[data-feature-file="${b.dataset.featureImport}"]`);if(f){f.value='';f.click()}});document.querySelectorAll('[data-feature-file]').forEach(inp=>inp.onchange=e=>importFeature(inp.dataset.featureFile,e.target.files&&e.target.files[0]));document.querySelectorAll('[data-page-print]').forEach(b=>b.onclick=()=>window.print())}
function dashboard(){const f=profiles.filter(p=>(p.fullName+p.pob).toLowerCase().includes(query.toLowerCase())),d=deriveDasa(selected),c=deriveChart(selected);return `<div class="stack">${dataActionBar('dashboard')}<div class="card ai"><h2>🤖 VedicSuite</h2><p class="small muted">Personalized Tamil horoscope, Muhurtham, Panchangam and calendar app.</p></div><div class="grid cards">${stat('☾',t('currentDasa'),d.mahadasha.lord,'Bhukti: '+d.antardasha.lord)}${stat('⭐',t('rasiLabel'),c.rasi,t('nakshatraLabel')+': '+c.nakshatra)}${stat('☀️','Sun Sign',c.sunSign,'Tithi: '+c.tithi)}${stat('🧭',t('lagnaLabel'),c.lagna,t('ayanamsaLabel')+': '+selected.ayanamsa.toFixed(1)+'°')}</div><div class="grid two"><div class="stack"><div class="card toolbar"><div><h2>Horoscope Profiles</h2><p class="small muted">Select a person to update all pages.</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><input id="search" placeholder="${t('searchPlaceholder')}" value="${esc(query)}" style="max-width:260px"><button class="btn primary" id="addBtn">${t('addProfile')}</button></div></div>${f.map(profileCard).join('')}</div><div class="stack">${chart(t('rasiChart'))}${scoreCard(selected)}</div></div>${table()}</div>`}
function horoscopeSelector(){return `<div class="card ai"><div class="toolbar"><div><h2>👤 Select Horoscope Profile</h2><p class="small muted">Choose any profile created under Dashboard → Horoscope Profiles. Complete Horoscope, charts and detailed Tamil horoscope update for the selected person.</p></div><div style="min-width:300px"><label>Horoscope Profile / ஜாதக சுயவிவரம்</label><select id="horoscopeProfileSelect" onchange="setHoroscopeProfile(this.value)">${profiles.map(p=>`<option value="${p.id}" ${Number(p.id)===Number(selected.id)?'selected':''}>${esc(p.fullName)} — ${esc(p.dob)} · ${esc(p.pob)}</option>`).join('')}</select></div></div></div>`}
function setHoroscopeProfile(id){const p=profiles.find(x=>Number(x.id)===Number(id));if(!p)return;selected=p;safeSet('selectedHoroscopeProfileId',id);render()}
function horoscope(){const saved=Number(safeGet('selectedHoroscopeProfileId','0'));if(saved){const p=profiles.find(x=>Number(x.id)===saved);if(p)selected=p}selected=normalizeProfile(selected)||profiles[0]||defaultProfiles[0];const c=deriveChart(selected);return `<div class="stack">${dataActionBar('horoscope')}${horoscopeSelector()}<div class="grid two"><div class="stack">${chart(t('rasiChart'),selected)}${chart(t('navamsaChart'),selected,navamsaPositionsFor)}</div><div class="stack"><div class="card"><h2>${esc(selected.fullName)} — ${t('completeHoroscope')}</h2><p class="muted">${t('birthPlaceInfo')}: ${selected.lat.toFixed(4)}°, ${selected.lon.toFixed(4)}° · UTC${selected.tzOffset>=0?'+':''}${selected.tzOffset} · ${t('ayanamsaLabel')} ${selected.ayanamsa.toFixed(2)}°</p><p class="muted">Rasi: ${c.rasi} · Nakshatra: ${c.nakshatra} P${c.pada} · Lagna: ${c.lagna} · Sun Sign: ${c.sunSign} · Tithi: ${c.tithi}</p></div>${detailedHoroscope(selected)}${table()}</div></div>${dasaSection(selected)}${yogaSection(selected)}</div>`}
function dasaSection(p){const d=deriveDasa(p);function fd(ms){return new Date(ms).toISOString().slice(0,10)}return `<div class="card"><h3>Vimshottari Dasa Timeline</h3><p class="small muted">Current: <b>${d.mahadasha.lord}/${d.antardasha.lord}</b></p><div class="table"><table><thead><tr><th>Mahadasha</th><th>Start</th><th>End</th></tr></thead><tbody>${d.timeline.slice(0,10).map(x=>`<tr><td>${x.lord}</td><td>${fd(x.startMs)}</td><td>${fd(x.endMs)}</td></tr>`).join('')}</tbody></table></div></div>`}function yogaSection(p){const y=deriveYogasDoshas(p);return `<div class="card"><h3>Yogas & Doshas</h3><div class="insights" style="margin-top:14px">${y.map(x=>`<div class="insight"><span>${x.present?'⚠':'✓'}</span><div><b>${x.name}</b><p class="small muted">${x.present?'Present':'Not present'} — ${x.desc}</p></div></div>`).join('')}</div></div>`}
function dailyPanchangam(){const today=dailyPanchangamFor(new Date()),days=panchangamDays(15);return `<div class="stack">${printActionBar()}<div class="card ai"><h2>🌅 Daily Panchangam</h2></div><div class="grid cards">${stat('🪷','Tamil Date',today.month+' '+today.day,'Tamil Year approx: '+today.tamilYear)}${stat('🌙','Nakshatra',today.nakshatra+' P'+today.pada,'Moon Rasi: '+today.rasi)}${stat('🌓','Tithi',today.tithi,today.phase)}${stat('⏱️','Rahu Kalam',today.rahu,'Emakandam: '+today.emakandam)}</div><div class="card"><h3>Next 15 Days</h3><div class="table"><table><thead><tr><th>Date</th><th>Weekday</th><th>Tithi</th><th>Special</th><th>Nakshatra</th><th>Rahu</th><th>Emakandam</th></tr></thead><tbody>${days.map(x=>`<tr><td>${x.date}</td><td>${x.weekday}</td><td>${x.tithi}</td><td>${x.phase}</td><td>${x.nakshatra} P${x.pada}</td><td>${x.rahu}</td><td>${x.emakandam}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function rahuKalamPage(){const days=panchangamDays(45),today=days[0];return `<div class="stack">${printActionBar()}<div class="card ai"><h2>⏱️ Daily Rahu Kalam & Emakandam</h2></div><div class="grid cards">${stat('⛔','Today Rahu Kalam',today.rahu,today.weekday)}${stat('⚠️','Today Emakandam',today.emakandam,'Yamagandam')}${stat('🕰️','Today Gulika',today.gulika,'Gulikai')}${stat('🌅','Daylight Base',today.sunrise+'-'+today.sunset,'Approximation')}</div><div class="card"><h3>Next 45 Days</h3><div class="table"><table><thead><tr><th>Date</th><th>Weekday</th><th>Rahu</th><th>Emakandam</th><th>Gulika</th><th>Tithi</th></tr></thead><tbody>${days.map(x=>`<tr><td>${x.date}</td><td>${x.weekday}</td><td>${x.rahu}</td><td>${x.emakandam}</td><td>${x.gulika}</td><td>${x.tithi}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function tamilCalendar(){const year=Number(safeGet('tamCalYear',String(new Date().getFullYear()))),monthFilter=Number(safeGet('tamCalMonth','-1'));let days=yearPanchangam(year);if(monthFilter>=0)days=days.filter(x=>x.month===tamilMonths[monthFilter]);const specials=yearPanchangam(year).filter(x=>x.phase!=='—');return `<div class="stack">${printActionBar()}<div class="card ai"><div class="toolbar"><div><h2>🗓️ Tamil Calendar</h2><p class="small muted">Yearly Tamil calendar with local date fix. 2026-08-14 shows Friday.</p></div><div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap"><div><label>Year</label><input type="number" value="${year}" onchange="safeSet('tamCalYear',this.value);render()" style="width:120px"></div><div><label>Tamil Month</label><select onchange="safeSet('tamCalMonth',this.value);render()" style="width:170px"><option value="-1" ${monthFilter<0?'selected':''}>All months</option>${tamilMonths.map((m,i)=>`<option value="${i}" ${monthFilter===i?'selected':''}>${m}</option>`).join('')}</select></div></div></div></div><div class="grid two"><div class="card"><h3>${year} Yearly Tamil Panchangam</h3><div class="table"><table><thead><tr><th>Date</th><th>Tamil Day</th><th>Weekday</th><th>Tithi</th><th>Special</th><th>Nakshatra</th><th>Rahu</th><th>Emakandam</th></tr></thead><tbody>${days.map(x=>`<tr><td>${x.date}</td><td>${x.month} ${x.day}</td><td>${x.weekday}</td><td>${x.tithi}</td><td>${x.phase}</td><td>${x.nakshatra} P${x.pada}</td><td>${x.rahu}</td><td>${x.emakandam}</td></tr>`).join('')}</tbody></table></div></div><div class="card"><h3>${year} Special Days</h3><div class="table"><table><thead><tr><th>Date</th><th>Special</th><th>Tithi</th><th>Nakshatra</th></tr></thead><tbody>${specials.map(x=>`<tr><td>${x.date}</td><td>${x.phase}</td><td>${x.tithi}</td><td>${x.nakshatra} P${x.pada}</td></tr>`).join('')}</tbody></table></div></div></div></div>`}
function muhurthamDetails(){return `<div class="stack">${printActionBar()}<div class="card ai"><h2>🪔 Muhurtham Details</h2><p class="small muted">Personalized for currently selected profile. Compatibility / Property / Business pages also use selected form profiles.</p></div>${personalizedMuhurtham('compatibility')}${personalizedMuhurtham('property')}${personalizedMuhurtham('business')}</div>`}
function pick(k,f,label){return `<div><label>${label}</label><select data-form="${k}" data-field="${f}"><option value="">Select saved profile</option>${profiles.map(p=>`<option value="${p.id}" ${val(k,f)==p.id?'selected':''}>${esc(p.fullName)} — ${p.dob}</option>`).join('')}</select></div>`}function input(k,f,type,label){return `<div><label>${label}</label><input data-form="${k}" data-field="${f}" type="${type}" value="${esc(val(k,f))}"></div>`}function applyPick(k,role,id){const p=profiles.find(x=>x.id==id);if(!p)return;setVal(k,role+'Name',p.fullName);setVal(k,role+'Dob',p.dob);setVal(k,role+'Time',p.tob);setVal(k,role+'Place',p.pob)}
function form(k,title){const mode=val(k,'mode')||'Single Person';if(k==='compatibility')return `<div class="card"><h2>${title}</h2><div class="grid half" style="margin-top:14px"><div class="mini"><h3>Bride Details</h3>${pick(k,'brideProfile','Search / pick bride profile')}${input(k,'brideName','text','Bride Name')}${input(k,'brideDob','date','DOB')}${input(k,'brideTime','time','Time')}${input(k,'bridePlace','text','Place')}</div><div class="mini"><h3>Groom Details</h3>${pick(k,'groomProfile','Search / pick groom profile')}${input(k,'groomName','text','Groom Name')}${input(k,'groomDob','date','DOB')}${input(k,'groomTime','time','Time')}${input(k,'groomPlace','text','Place')}</div></div><button class="btn primary" style="margin-top:14px" data-analyze="compatibility">Analyze Match</button></div>`;return `<div class="card"><div class="toolbar"><h2>${title}</h2><div><button class="btn ${mode==='Single Person'?'primary':''}" data-mode="${k}" data-value="Single Person">Single Person</button> <button class="btn ${mode==='Married Couple'?'primary':''}" data-mode="${k}" data-value="Married Couple">Married Couple</button></div></div>${mode==='Married Couple'?`<div class="grid half" style="margin-top:14px"><div class="mini"><h3>Husband Details</h3>${pick(k,'husbandProfile','Pick husband')}${input(k,'husbandName','text','Name')}${input(k,'husbandDob','date','DOB')}${input(k,'husbandTime','time','Time')}</div><div class="mini"><h3>Wife Details</h3>${pick(k,'wifeProfile','Pick wife')}${input(k,'wifeName','text','Name')}${input(k,'wifeDob','date','DOB')}${input(k,'wifeTime','time','Time')}</div></div>`:`<div class="grid form4" style="margin-top:14px">${pick(k,'singleProfile','Pick saved profile')}${input(k,'name','text','Name')}${input(k,'dob','date','DOB')}${input(k,'time','time','Time')}</div><div style="margin-top:10px">${input(k,'place','text','Place')}</div>`}<button class="btn primary" style="margin-top:14px" data-analyze="${k}">Analyze ${title}</button></div>`}
function scoreBand(score){return score>=85?'Excellent':score>=75?'Strong':score>=65?'Moderate':score>=55?'Caution':'Weak'}function scoreDetails(k,score,seed){const h=hash(seed+k),j=i=>((h>>(i*3))%11)-5,cl=v=>Math.max(35,Math.min(98,v));const map=k==='compatibility'?[['Dina / Tara Balance',score+j(1),'Daily star harmony and routine comfort.'],['Gana & Temperament',score+j(2),'Personality rhythm and communication style.'],['Rasi & Rasi Athipathi',score+j(3),'Moon-sign relationship and sign-lord friendliness.'],['Rajju / Nadi Review',score-8+j(4),'Traditional long-term stability checks.'],['Kuja / Dasa Sandhi',score-5+j(5),'Mars and period transition caution.']]:k==='property'?[['Lagna & 4th House Support',score+j(1),'Residence stability and ownership support.'],['Mars/Saturn Land Factors',score-4+j(2),'Land, construction and delays.'],['Finance & Loan Timing',score+j(3),'Cashflow and approvals.'],['Document Window',score-6+j(4),'Registration timing.'],['Muhurtham Fit',score+j(5),'Auspicious timing support.']]:[['10th House Strength',score+j(1),'Execution momentum.'],['Mercury/Jupiter Logic',score+j(2),'Planning and contracts.'],['Venus/Mars Market Energy',score-3+j(3),'Sales and brand energy.'],['Cash-flow Risk',score-7+j(4),'Working capital risk.'],['Launch Muhurtham Fit',score+j(5),'Launch timing.']];return map.map(([label,value,why])=>{value=cl(value);return {label,value,why,advice:value>=75?'Favourable':value>=60?'Acceptable with review':'Needs careful review'}})}function result(k){
  const r=results[k];
  if(!r)return '';
  const details=Array.isArray(r.details)?r.details:scoreDetails(k,r.score||65,r.text||r.title||k);
  r.details=details;
  saveResults();
  return `<div class="card ok"><div class="toolbar"><h2>${r.title}</h2>${badge(r.score)}</div><p class="muted">${r.text}</p><div class="grid" style="grid-template-columns:repeat(2,1fr);margin-top:14px">${details.map(d=>`<div class="mini"><div class="toolbar"><b>${d.label}</b>${badge(d.value)}</div><div class="bar" style="margin:9px 0"><div class="fill" style="width:${d.value}%"></div></div><p class="small muted"><b>Why:</b> ${d.why}</p><p class="small muted"><b>Advice:</b> ${d.advice}</p></div>`).join('')}</div></div>`;
}
function analyze(k){let raw='';if(k==='compatibility')raw=val(k,'brideName')+val(k,'brideDob')+val(k,'groomName')+val(k,'groomDob');else raw=Object.values(forms[k]||{}).join('|');const s=(k==='compatibility'?55:60)+(hash(raw+k)%(k==='compatibility'?42:36));results[k]={title:`AI ${k==='compatibility'?'Wedding Compatibility':k==='property'?'Property':'Business'} Result`,score:s,text:`Overall band: ${scoreBand(s)}. Use the personalized Muhurtham shortlist below and verify with practical due diligence.`,details:scoreDetails(k,s,raw)};saveResults();toast('AI analysis completed');render()}
function compatibility(){return `<div class="stack">${printActionBar()}${form('compatibility','Wedding Compatibility')}${result('compatibility')}${personalizedMuhurtham('compatibility')}</div>`}function prediction(k){return `<div class="stack">${printActionBar()}${form(k,k==='property'?'New Property':'New Business')}${result(k)}${personalizedMuhurtham(k)}</div>`}function engine(){return `<div class="stack"><div class="card ai"><h2>AI Local Engine</h2><p class="muted">Single-file browser suite with sidereal-style calculations, local date fix, personalized Muhurtham, horoscope profile selector, and Tamil detailed horoscope.</p></div>${table()}</div>`}
function openProfileModal(p){draft=p?{...p}:{fullName:'',gender:'',dob:'',tob:'',pob:'',lat:9.9252,lon:78.1198,tzOffset:5.5,tzName:'Asia/Kolkata',countryCode:'in'};$('#modalOverlay').classList.add('open');renderModal()}function closeProfileModal(){$('#modalOverlay').classList.remove('open');draft=null}function renderModal(){$('#modalBody').innerHTML=`<h2>${draft.id?'Edit':'Add'} Profile</h2><div class="stack"><div><label>Name</label><input id="mName" value="${esc(draft.fullName)}"></div><div class="row"><div><label>Label</label><input id="mGender" value="${esc(draft.gender)}"></div><div><label>DOB</label><input id="mDob" type="date" value="${esc(draft.dob)}"></div></div><div class="row"><div><label>Time</label><input id="mTob" type="time" value="${esc(draft.tob)}"></div><div><label>Place</label><input id="mPob" value="${esc(draft.pob)}"></div></div><div class="row"><div><label>Latitude</label><input id="mLat" type="number" step="0.0001" value="${draft.lat}"></div><div><label>Longitude</label><input id="mLon" type="number" step="0.0001" value="${draft.lon}"></div></div><div><label>UTC Offset</label><input id="mTz" type="number" step="0.25" value="${draft.tzOffset}"></div><div class="actions"><button class="btn" id="mCancel">${t('cancel')}</button><button class="btn primary" id="mSave">${t('save')}</button></div></div>`;['Name','Gender','Dob','Tob','Pob','Lat','Lon','Tz'].forEach(x=>$('#m'+x).oninput=e=>draft[{Name:'fullName',Gender:'gender',Dob:'dob',Tob:'tob',Pob:'pob',Lat:'lat',Lon:'lon',Tz:'tzOffset'}[x]]=['Lat','Lon','Tz'].includes(x)?parseFloat(e.target.value):e.target.value);$('#mCancel').onclick=closeProfileModal;$('#mSave').onclick=()=>{if(!draft.fullName||!draft.dob||!draft.tob){toast('Please fill birth details');return}const raw={...draft,id:draft.id||Math.max(0,...profiles.map(x=>x.id))+1,birthUtcMs:birthUtcMsFrom(draft.dob,draft.tob,draft.tzOffset||5.5)};const c=calcProfile(raw);if(draft.id)profiles[profiles.findIndex(x=>x.id===draft.id)]=c;else profiles.push(c);selected=c;safeSet('selectedHoroscopeProfileId',c.id);saveProfiles();closeProfileModal();render()}}
function act(a,id){const p=profiles.find(x=>x.id==id);if(!p)return;if(a==='edit')openProfileModal(p);if(a==='del'){if(profiles.length<2)return toast('At least one profile required');profiles=profiles.filter(x=>x.id!=id);selected=profiles[0];saveProfiles();render()}}
function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{active=b.dataset.nav;$('#side').classList.remove('open');render()});$('#addBtn')?.addEventListener('click',()=>openProfileModal(null));$('#search')?.addEventListener('input',e=>{query=e.target.value;render()});document.querySelectorAll('[data-profile]').forEach(c=>c.onclick=e=>{if(e.target.closest('button'))return;selected=profiles.find(p=>p.id==c.dataset.profile)||profiles[0];safeSet('selectedHoroscopeProfileId',selected.id);render()});document.querySelectorAll('[data-act]').forEach(b=>b.onclick=e=>{e.stopPropagation();act(b.dataset.act,+b.dataset.id)});document.querySelectorAll('[data-form][data-field]').forEach(el=>{el.oninput=e=>setVal(e.target.dataset.form,e.target.dataset.field,e.target.value);el.onchange=e=>{setVal(e.target.dataset.form,e.target.dataset.field,e.target.value);const f=e.target.dataset.field,k=e.target.dataset.form;if(f.endsWith('Profile')&&e.target.value){applyPick(k,f.replace('Profile',''),e.target.value);render()}}});document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{setVal(b.dataset.mode,'mode',b.dataset.value);render()});document.querySelectorAll('[data-analyze]').forEach(b=>b.onclick=()=>analyze(b.dataset.analyze))}
function render(){selected=normalizeProfile(selected)||profiles[0]||defaultProfiles[0];profiles=profiles.map(normalizeProfile).filter(Boolean);if(!profiles.length)profiles=[...defaultProfiles];saveProfiles();const meta=navItems.find(x=>x[0]===active)||navItems[0];$('#pageIcon').textContent=meta[2];$('#pageTitle').textContent=t(meta[1]);$('#nav').innerHTML=nav();try{$('#content').innerHTML={dashboard,dailypanchangam:dailyPanchangam,rahukalam:rahuKalamPage,tamilcalendar:tamilCalendar,muhurtham:muhurthamDetails,horoscope,compatibility,property:()=>prediction('property'),business:()=>prediction('business'),engine}[active]()}catch(e){$('#content').innerHTML=`<div class="card"><h2>Something went wrong</h2><p class="muted">${esc(e.message)}</p></div>`;console.error(e)}bind();bindFeatureActions()}
function init(){document.documentElement.dataset.theme=safeGet('theme','light');$('#themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';$('#themeBtn').onclick=()=>{const tt=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=tt;safeSet('theme',tt);$('#themeBtn').textContent=tt==='dark'?'☀️':'🌙'};$('#langBtn').textContent=t('langToggleLabel');$('#langBtn').onclick=()=>{lang=lang==='en'?'ta':'en';safeSet('lang',lang);$('#langBtn').textContent=t('langToggleLabel');render()};$('#menuBtn').onclick=()=>$('#side').classList.toggle('open');$('#modalCancelBg').onclick=e=>{if(e.target.id==='modalCancelBg')closeProfileModal()};render()}window.addEventListener('error',e=>toast('Script error: '+e.message));init();
</script>
